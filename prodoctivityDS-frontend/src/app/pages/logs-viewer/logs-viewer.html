<div class="logs-container">
  <h2>Visor de Logs</h2>

  <div class="filters">
    <mat-form-field appearance="outline" class="filter-level">
      <mat-label>Nivel</mat-label>
      <mat-select [(ngModel)]="selectedLevel">
        <mat-option value="">Todos</mat-option>
        <mat-option *ngFor="let lvl of levels" [value]="lvl">{{ lvl }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-doc">
      <mat-label>ID de Documento</mat-label>
      <input matInput [(ngModel)]="searchDocumentId" placeholder="Ej: 699f63cc...">
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-limit">
      <mat-label>Límite</mat-label>
      <input matInput type="number" [(ngModel)]="limit" min="1" max="500">
    </mat-form-field>

    <div class="filter-actions">
      <button mat-raised-button color="primary" (click)="applyFilters()">
        <mat-icon>search</mat-icon> Aplicar
      </button>
      <button mat-button (click)="clearFilters()">
        <mat-icon>clear</mat-icon> Limpiar
      </button>
    </div>
  </div>

  <div class="toolbar">
    <mat-checkbox [(ngModel)]="autoRefresh" (change)="toggleAutoRefresh()">
      Auto-refresh cada {{ refreshInterval }}s
    </mat-checkbox>

    <button mat-raised-button color="warn" (click)="clearAllLogs()" class="clear-btn">
      <mat-icon>delete</mat-icon> Limpiar todos
    </button>
  </div>

  <div class="table-container" *ngIf="!loading; else loadingSpinner">
    <table mat-table [dataSource]="logs" class="logs-table">

      <!-- Columna Timestamp -->
      <ng-container matColumnDef="timestamp">
        <th mat-header-cell *matHeaderCellDef> Fecha/Hora </th>
        <td mat-cell *matCellDef="let log"> {{ formatTimestamp(log.timestamp) }} </td>
      </ng-container>

      <!-- Columna Level -->
      <ng-container matColumnDef="level">
        <th mat-header-cell *matHeaderCellDef> Nivel </th>
        <td mat-cell *matCellDef="let log">
          <span class="level-badge" [ngClass]="getLevelClass(log.level)">{{ log.level }}</span>
        </td>
      </ng-container>

      <!-- Columna Category -->
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef> Categoría </th>
        <td mat-cell *matCellDef="let log"> {{ log.category }} </td>
      </ng-container>

      <!-- Columna Message -->
      <ng-container matColumnDef="message">
        <th mat-header-cell *matHeaderCellDef> Mensaje </th>
        <td mat-cell *matCellDef="let log"> {{ log.message }} </td>
      </ng-container>

      <!-- Columna Document ID -->
      <ng-container matColumnDef="documentId">
        <th mat-header-cell *matHeaderCellDef> Documento </th>
        <td mat-cell *matCellDef="let log"> {{ log.documentId || '-' }} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Mensaje cuando no hay datos -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">No hay logs para mostrar</td>
      </tr>
    </table>

    <mat-paginator 
  [length]="logs.length" 
  [pageSize]="pageSize" 
  [pageSizeOptions]="[25, 50, 100]" 
  showFirstLastButtons
  (page)="onPageChange($event)">
</mat-paginator>
  </div>

  <ng-template #loadingSpinner>
    <div class="spinner-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  </ng-template>
</div>
