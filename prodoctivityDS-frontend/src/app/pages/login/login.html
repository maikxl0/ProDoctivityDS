<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <mat-icon>description</mat-icon>
      </div>
      <h1>ProDoctivity</h1>
      <p class="login-subtitle">Document Processing System</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">person</mat-icon>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Ingrese su usuario"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <mat-icon class="input-icon">lock</mat-icon>
          <input
            id="password"
            [type]="hidePassword ? 'password' : 'text'"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required
            autocomplete="current-password"
          >
          <button type="button" class="toggle-password" (click)="hidePassword = !hidePassword" tabindex="-1">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
      </div>

      <button class="login-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
        @if (isLoading) {
          <span class="spinner"></span>
          Iniciando sesión...
        } @else {
          Iniciar Sesión
        }
      </button>

      @if (errorMessage) {
        <div class="error-message">
          <mat-icon>error_outline</mat-icon>
          {{ errorMessage }}
        </div>
      }
    </form>

    <div class="login-footer">
      <p>Powered by ProDoctivity Cloud</p>
    </div>
  </div>
</div>
